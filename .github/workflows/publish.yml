name: Publish Package

on:
    workflow_dispatch:
    schedule:
        - cron: '0 0 * * *'

jobs:
    publish:
        runs-on: ubuntu-latest

        permissions:
            contents: write
            id-token: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  registry-url: 'https://registry.npmjs.org'

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Update NPM
              run: bun install -g npm@latest

            - name: Install dependencies
              run: bun install

            - name: Build package
              run: bun run compile

            - name: Format package
              run: bun run format

            - name: Check for build changes
              id: changes
              run: |
                  if git diff --quiet; then
                    echo "changed=false" >> $GITHUB_OUTPUT
                  else
                    echo "changed=true" >> $GITHUB_OUTPUT
                  fi

            - name: Stop if no changes
              if: steps.changes.outputs.changed == 'false'
              run: |
                  echo "No compiled changes detected."
                  exit 0

            - name: Bump version
              if: steps.changes.outputs.changed == 'true'
              id: version-bump
              run: |
                  npm version patch --no-git-tag-version

            - name: Commit and push changes
              if: steps.changes.outputs.changed == 'true'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git add .
                  VERSION=$(node -p "require('./package.json').version")

                  git commit -m "chore: publish v$VERSION"
                  git tag v$VERSION

                  git push origin HEAD
                  git push origin v$VERSION

            - name: Publish to npm
              if: steps.changes.outputs.changed == 'true'
              id: npm-publish
              run: |
                  NODE_AUTH_TOKEN="" npm publish --provenance --access public

            - name: Get package version
              if: steps.changes.outputs.changed == 'true'
              id: package-version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "tag=v$VERSION" >> $GITHUB_OUTPUT

            - name: Generate Release Notes
              if: steps.changes.outputs.changed == 'true'
              id: release-notes
              run: |
                  PREV_TAG=$(git describe --abbrev=0 --tags 2>/dev/null || echo "")
                  COMMITS=$(git log ${PREV_TAG:+$PREV_TAG..}HEAD --pretty=format:"- %s ([%h](https://github.com/${{ github.repository }}/commit/%H)) - %an" --no-merges)
                  cat << EOF > release_notes.md
                  ## Release ${{ steps.package-version.outputs.version }}

                  Published to npm: https://www.npmjs.com/package/flags.ts/v/${{ steps.package-version.outputs.version }}

                  ### Changes

                  $COMMITS
                  EOF

                  echo "notes<<EOF" >> $GITHUB_OUTPUT
                  cat release_notes.md >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Create GitHub Release
              if: steps.changes.outputs.changed == 'true'
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ steps.package-version.outputs.tag }}
                  name: Release ${{ steps.package-version.outputs.tag }}
                  body: ${{ steps.release-notes.outputs.notes }}
